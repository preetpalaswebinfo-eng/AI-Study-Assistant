<!DOCTYPE html>
<html>
<head>
    <title>AI Study Assistant</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

    body{
        background:#f4f7fe;
    }

    .sidebar{
        position:fixed;
        left:0;
        top:0;
        width:260px;
        height:100vh;
        background:#111827;
        padding:25px;
    }

    .sidebar a{
        display:block;
        color:white;
        text-decoration:none;
        padding:12px;
        margin-bottom:10px;
        border-radius:10px;
    }

    .sidebar a:hover{
        background:#374151;
    }

    .logo{
        color:white;
        font-size:26px;
        font-weight:bold;
        margin-bottom:40px;
    }

    .main{
        margin-left:280px;
        padding:30px;
    }

    @media (max-width:768px){

    .sidebar{
        position:relative;
        width:100%;
        height:auto;
        padding:15px;
    }

    .logo{
        font-size:22px;
        margin-bottom:20px;
        text-align:center;
    }

    .sidebar a{
        padding:10px;
        margin-bottom:5px;
        text-align:center;
    }

    .main{
        margin-left:0;
        padding:15px;
    }

    .header{
        padding:18px !important;
    }

    .header h2{
        font-size:22px;
    }

    .planner-card,
    .quiz-card,
    .career-card,
    .flashcard-card,
    .summarizer-card,
    .upload-card,
    .result-card,
    .chat-box{
        padding:15px !important;
    }

    .input-group{
        flex-direction:column;
    }

    .input-group .form-control{
        width:100%;
        margin-bottom:10px;
    }

    .input-group .btn{
        width:100%;
    }

}
    </style>

</head>

<body>

<div class="sidebar">

    <div class="logo">
        🤖 AI Study Assistant
    </div>

    <a href="/dashboard">🏠 Dashboard</a>

    <a href="/chat">💬 AI Chat</a>

    <a href="/summarizer">📚 Summarizer</a>

    <a href="/quiz">📝 Quiz Generator</a>

    <a href="/planner">📅 Study Planner</a>

    <a href="/pdf_analyzer">📄 PDF Analyzer</a>

    <a href="/flashcards">🗂 Flashcards</a>

    <a href="/career">🎯 Career Guidance</a>

</div>

<div class="main">

    {% block content %}
    {% endblock %}

</div>

</body>
</html>
