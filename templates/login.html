
<!DOCTYPE html>
<html>
<head>

    <title>AI Study Assistant Login</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:linear-gradient(135deg,#4f46e5,#06b6d4);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-card{
            width:420px;
            background:white;
            padding:40px;
            border-radius:25px;
            box-shadow:0 15px 40px rgba(0,0,0,.2);
        }

        .logo{
            text-align:center;
            font-size:55px;
            margin-bottom:10px;
        }

        .title{
            text-align:center;
            font-weight:bold;
            font-size:28px;
            margin-bottom:10px;
        }

        .subtitle{
            text-align:center;
            color:gray;
            margin-bottom:30px;
        }

        .form-control{
            border-radius:12px;
            padding:12px;
        }

        .btn-login{
            width:100%;
            padding:12px;
            border:none;
            border-radius:12px;
            background:#4f46e5;
            color:white;
            font-weight:bold;
            transition:.3s;
        }

        .btn-login:hover{
            background:#4338ca;
        }

        @media(max-width:500px){

            .login-card{
                width:95%;
                padding:25px;
            }

            .title{
                font-size:22px;
            }

        }

    </style>

</head>

<body>

<div class="login-card">

    <div class="logo">
        🤖
    </div>

    <div class="title">
        AI Study Assistant
    </div>

    <div class="subtitle">
        Smart Learning Powered by AI
    </div>

    <form action="/dashboard" method="POST">

        <label class="mb-2">
            Username
        </label>

        <input
            type="text"
            name="username"
            class="form-control"
            placeholder="Enter Username"
            required>

        <br>

        <label class="mb-2">
            Password
        </label>

        <input
            type="password"
            name="password"
            class="form-control"
            placeholder="Enter Password"
            required>

        <br>

        <button type="submit" class="btn-login">
            Login
        </button>

    </form>

</div>

</body>
</html>
